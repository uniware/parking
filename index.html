<!DOCTYPE html>
<html lang="en-US">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Uniware.ca – We provide consultancy crafted to your IT needs</title>
<style>
  :root{
    --dark: #222;
    --darker: #1a1a1a;
    --nav-bg: #1a1a1a;
    --text: #333;
    --muted: #767676;
    --border: #ddd;
    --link: #222;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  body{
    font-family: "Libre Franklin", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    color: var(--text);
    background:#fff;
    line-height:1.7;
  }
  a{ color: var(--link); text-decoration:none; }
  a:hover{ text-decoration:underline; }
  .wrap{ max-width:1000px; margin:0 auto; padding:0 25px; }

  /* Header / hero */
  .site-header{ position:relative; background:var(--dark); }
  .custom-header-media{
    position:relative;
    height: 620px;
    background: url("./images/hero.jpg") center center / cover no-repeat;
  }
  .custom-header-media::after{
    content:"";
    position:absolute; inset:0;
    background: linear-gradient(to bottom, rgba(0,0,0,0.15) 0%, rgba(0,0,0,0.55) 100%);
  }
  .site-branding{
    position:absolute;
    left:0; right:0; bottom: 90px;
    text-align:center;
    color:#fff;
    z-index:2;
  }
  .site-title{
    margin:0;
    font-size: 2.6em;
    font-weight:800;
    letter-spacing: 1px;
  }
  .site-title a{ color:#fff; }
  .site-description{
    margin:.6em 0 0;
    font-size: 1.15em;
    font-weight:300;
    color:#f1f1f1;
  }

  /* Nav */
  .navigation-top{ background: var(--nav-bg); border-top:1px solid rgba(255,255,255,.08); }
  .main-navigation ul{
    list-style:none; margin:0; padding:0;
    display:flex; justify-content:center; flex-wrap:wrap;
  }
  .main-navigation li{ margin:0; }
  .main-navigation a{
    display:block;
    padding: 18px 22px;
    color:#ccc;
    font-size:.85em;
    text-transform:uppercase;
    letter-spacing:1.5px;
    font-weight:600;
  }
  .main-navigation a:hover,
  .main-navigation .current-menu-item a{
    color:#fff;
    text-decoration:none;
    background: rgba(255,255,255,0.06);
  }

  /* Content */
  .site-content{ padding: 70px 0; }
  .entry-header{ text-align:center; margin-bottom: 20px; }
  .entry-title{
    font-size: 1.9em;
    font-weight:800;
    margin:0 0 10px;
  }
  .entry-content{
    max-width: 640px;
    margin: 0 auto;
    text-align:center;
    font-size: 1.1em;
    color:#444;
  }

  /* Footer */
  .site-footer{
    background: var(--dark);
    color:#ccc;
    padding: 55px 0 25px;
    margin-top: 20px;
  }
  .widget-area{
    display:flex;
    flex-wrap:wrap;
    gap: 40px;
    padding-bottom: 30px;
    border-bottom: 1px solid rgba(255,255,255,.12);
  }
  .widget-column{ flex: 1 1 260px; }
  .widget-title{
    color:#fff;
    font-size: 1em;
    text-transform:uppercase;
    letter-spacing:1px;
    margin: 0 0 14px;
    font-weight:700;
  }
  .widget a{ color:#9fd3ff; }
  .search-form{ display:flex; max-width:280px; }
  .search-field{
    flex:1;
    padding:8px 10px;
    border:1px solid #444;
    background:#2b2b2b;
    color:#eee;
    border-radius:2px 0 0 2px;
  }
  .search-submit{
    padding:8px 14px;
    border:none;
    background:#444;
    color:#fff;
    cursor:pointer;
    border-radius:0 2px 2px 0;
  }
  .search-submit:hover{ background:#555; }

  .social-navigation ul{
    list-style:none; margin: 22px 0 0; padding:0;
    display:flex; gap:14px;
  }
  .social-navigation a{
    display:flex; align-items:center; justify-content:center;
    width:36px; height:36px;
    border-radius:50%;
    background: rgba(255,255,255,.08);
    color:#fff;
    font-size: 1.1em;
  }
  .social-navigation a:hover{ background: rgba(255,255,255,.18); text-decoration:none; }

  .site-info{
    margin-top: 22px;
    font-size: .8em;
    color:#888;
  }
  .site-info a{ color:#aaa; }

  @media (max-width: 600px){
    .custom-header-media{ height: 420px; }
    .site-title{ font-size: 1.8em; }
    .site-branding{ bottom: 60px; }
    .main-navigation a{ padding: 14px 14px; }
  }
</style>
</head>
<body>

<div id="page" class="site">

  <header id="masthead" class="site-header">
    <div class="custom-header-media"></div>

    <div class="site-branding">
      <h1 class="site-title"><a href="#">Uniware.ca</a></h1>
      <p class="site-description">We provide consultancy crafted to your IT needs</p>
    </div>
  </header>

  <div class="site-content-contain">
    <div id="content" class="site-content">
      <div class="wrap">
        <article id="post-14" class="page">
          <div class="entry-content">
            <p>We provide consultancy crafted to your IT needs. </p><p>Please contact us for further assistance.</p>
          </div>
        </article>
      </div>
    </div>

    <footer id="colophon" class="site-footer">
      <div class="wrap">
        <aside class="widget-area" aria-label="Footer">
          <div class="widget-column">
            <section class="widget widget_text">
              <h2 class="widget-title">Find Us</h2>
              <p><strong>Email</strong><br>
              <a href="mailto:contactus@uniware.ca">contactus@uniware.ca</a></p>
            </section>
          </div>
          <div class="widget-column">
            <section class="widget widget_text">
              <h2 class="widget-title">About This Site</h2>
              <p>Thank you for visiting.  Please contact us for further assistance.</p>
            </section>
          </div>
        </aside>

        <nav class="social-navigation" aria-label="Footer Social Links Menu">
          <ul>
            <li><a href="mailto:contactus@uniware.ca" title="Email">&#9993;</a></li>
          </ul>
        </nav>

        <div class="site-info">
          <p>&copy; Uniware.ca</p>
        </div>
      </div>
    </footer>
  </div>

</div>

</body>
</html>
